<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <!-- Mobil cihazlarda kusursuz görünüm için viewport ayarı -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Baran Hoca'nın Teknoloji Üssü</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #0f172a;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.08) 0%, transparent 50%);
            color: #f8fafc;
            min-height: 100vh;
            /* Mobilde tarayıcı çubuğu hesaba katılarak tam yükseklik */
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden; /* Yatay kaymayı kesin engelle */
            touch-action: pan-y; /* Sadece dikey kaydırmaya izin ver */
            -webkit-tap-highlight-color: transparent; /* Mobilde tıklama parlaklığını kaldır */
        }

        .font-fredoka { font-family: 'Fredoka One', cursive; }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); /* Safari desteği */
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .game-card {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Mobilde sürükleme vs olaylarını etkisizleştir */
            user-select: none;
            -webkit-user-select: none;
        }
        
        /* Hover efekti mobilde (dokunmada) bazen takılı kalır, bu yüzden sadece hover destekleyen cihazlarda çalışması iyidir ama basitlik için genel bıraktık, active ile destekledik */
        @media (hover: hover) {
            .game-card:hover {
                transform: translateY(-10px) scale(1.02);
                box-shadow: 0 20px 40px rgba(0,0,0,0.4);
                border-color: rgba(255, 255, 255, 0.3);
            }
            .link-card:hover {
                background: rgba(30, 41, 59, 0.9);
                border-color: rgba(56, 189, 248, 0.5);
                transform: translateY(-3px);
                box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            }
        }

        /* Mobilde dokunma (active) efekti */
        .game-card:active {
            transform: scale(0.98);
            border-color: rgba(56, 189, 248, 0.5);
        }
        .link-card:active {
            transform: scale(0.98);
            background: rgba(30, 41, 59, 0.9);
        }

        .link-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.2s;
            text-decoration: none;
            user-select: none;
        }

        .text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: linear-gradient(to right, #38bdf8, #818cf8, #f472b6);
        }
    </style>
</head>
<body class="relative">

    <!-- HEADER: Mobilde butonları alta almak veya küçültmek için flex yapısı düzenlendi -->
    <header class="glass-panel sticky top-0 z-50 w-full px-3 md:px-8 py-3 md:py-4 flex flex-col sm:flex-row justify-between items-center gap-3 md:gap-4 border-b border-white/10">
        
        <div class="flex items-center gap-3 w-full sm:w-auto justify-center sm:justify-start">
            <div class="w-12 h-12 md:w-14 md:h-14 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center text-2xl md:text-3xl shadow-lg shadow-blue-500/30 shrink-0">
                🚀
            </div>
            <div class="text-center sm:text-left">
                <h1 class="text-xl md:text-3xl font-fredoka text-white tracking-wide leading-tight">Baran Hoca'nın <span class="text-blue-400">Teknoloji Üssü</span></h1>
                <p class="text-slate-400 font-bold text-[10px] md:text-xs uppercase tracking-widest mt-0.5">Bilişim Teknolojileri Laboratuvarı</p>
            </div>
        </div>

        <div class="flex gap-2 md:gap-3 w-full sm:w-auto">
             <button onclick="showGames()" id="btn-games" class="flex-1 sm:flex-none justify-center whitespace-nowrap bg-blue-600 hover:bg-blue-500 text-white font-bold px-3 md:px-6 py-2 md:py-2.5 rounded-xl transition-all shadow-lg shadow-blue-500/30 active:scale-95 text-xs md:text-base flex items-center gap-1 md:gap-2">
                 <span>🎮</span> <span class="hidden sm:inline">Tüm </span>Oyunlar
             </button>
             <button onclick="showUsefulLinks()" id="btn-links" class="flex-1 sm:flex-none justify-center whitespace-nowrap bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold px-3 md:px-6 py-2 md:py-2.5 rounded-xl border border-slate-600 transition-all flex items-center gap-1 md:gap-2 active:scale-95 text-xs md:text-base">
                 <span>🔗</span> <span class="hidden sm:inline">Yararlı </span>Linkler
             </button>
        </div>
    </header>

    <!-- OYUNLAR BÖLÜMÜ -->
    <main id="games-container" class="flex-1 max-w-[1400px] mx-auto px-3 md:px-8 py-6 md:py-8 w-full">
        <!-- Mobilde tek kolon, tablette 2, büyük ekranda 3 veya 4 kolon -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6" id="games-grid">
            <!-- Oyunlar JS ile buraya yüklenecek -->
        </div>
    </main>

    <!-- LİNKLER BÖLÜMÜ -->
    <main id="links-container" class="flex-1 max-w-[1200px] mx-auto px-4 md:px-8 py-6 md:py-10 w-full hidden">
        <div class="text-center mb-8 md:mb-12">
            <h2 class="text-3xl md:text-5xl font-fredoka text-blue-400 mb-2 md:mb-4">Yararlı Linkler</h2>
            <p class="text-slate-400 font-bold text-sm md:text-lg">Derslerde kullanacağımız platformlara ve yapay zeka araçlarına buradan ulaşabilirsin.</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6" id="links-grid">
            <!-- Linkler JS ile buraya yüklenecek -->
        </div>
    </main>

    <!-- LİNK DETAY MODALI -->
    <div id="link-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/80 backdrop-blur-sm p-4 hidden opacity-0 transition-opacity duration-300">
        <div class="glass-panel p-6 md:p-10 max-w-md w-full text-center rounded-3xl border-4 border-blue-500 relative transform transition-transform scale-95" id="link-modal-content">
            <button onclick="closeLinkModal()" class="absolute top-2 right-2 md:top-4 md:right-4 bg-slate-800 hover:bg-red-500 text-white w-8 h-8 md:w-10 md:h-10 rounded-xl font-bold flex items-center justify-center transition-colors text-xl">✖</button>
            
            <div class="mb-2 md:mb-4 mt-2 md:mt-0">
                <span id="link-modal-icon" class="text-6xl md:text-7xl drop-shadow-lg">🔗</span>
            </div>
            
            <h3 id="link-modal-title" class="text-2xl md:text-3xl font-fredoka text-white mb-2 leading-tight">Platform Adı</h3>
            
            <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 mb-6 md:mb-8 mt-4 text-left max-h-[40vh] overflow-y-auto">
                <p class="text-blue-400 font-black text-xs md:text-sm uppercase tracking-wider mb-2 border-b border-slate-700 pb-2 sticky top-0 bg-slate-800">Burada Neler Yapabiliriz?</p>
                <p id="link-modal-desc" class="text-slate-300 font-medium text-sm md:text-base leading-relaxed">Açıklama metni.</p>
            </div>
            
            <button id="link-modal-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black text-lg md:text-xl py-3 md:py-4 rounded-xl shadow-[0_6px_0_#1d4ed8] active:translate-y-2 active:shadow-none transition-all flex justify-center items-center gap-2">
                <span>🚀</span> SİTEYE GİT
            </button>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="w-full bg-slate-900/80 border-t border-slate-800 py-4 md:py-6 mt-auto">
        <div class="text-center px-4">
            <p class="text-slate-400 font-bold text-xs md:text-sm flex flex-col sm:flex-row items-center justify-center gap-1">
                <span>Tasarım ve Geliştirme:</span> 
                <span class="text-gradient font-black text-sm md:text-base tracking-wider">MEHMET BARAN İKİOK</span>
            </p>
        </div>
    </footer>

    <script>
        const gamesList = [
            { id: 'galaktik_klasör', title: "Galaktik Klavye", desc: "Meteorlar şehre çarpmadan kelimeleri klavyenle hızlıca yaz!", icon: '⌨️', color: 'from-slate-700 to-slate-900', tags: ['Klavye'], fileUrl: 'Galaktik_Klavye.html' },
            { id: 'mutlu_balonlar', title: "Mutlu Balonlar", desc: "Fare kullanımını geliştirmek için balonları patlat.", icon: '🎈', color: 'from-pink-500 to-rose-600', tags: ['Fare Kullanımı'], fileUrl: 'mutlu_balonlar.html' },
            { id: 'minik_kodlayicilar', title: "Minik Kodlayıcılar", desc: "Kodlamaya atılan ilk adımlar için eğlenceli görevler.", icon: '👶', color: 'from-yellow-400 to-orange-500', tags: ['Temel Kodlama'], fileUrl: 'Minik_Kodlayicilar.html' },
            { id: 'akilli_klasorler', title: "Akıllı Klasörler", desc: "Masaüstü birbirine girmiş! Dosya türlerine dikkat ederek taşı.", icon: '📁', color: 'from-violet-500 to-fuchsia-700', tags: ['İşletim Sistemi'], fileUrl: 'akilli_klasorler.html' },
            { id: 'algoritma_gezgini', title: "Algoritma Gezgini", desc: "Kod bloklarını kullanarak karakterini hedefe ulaştır.", icon: '🧭', color: 'from-teal-500 to-emerald-700', tags: ['Kodlama'], fileUrl: 'Algoritma_Gezgini.html' },
            { id: 'algoritma_treni', title: "Algoritma Treni", desc: "Vagonlara resimleri doğru sırayla yerleştir, treni hareket ettir!", icon: '🚂', color: 'from-sky-500 to-blue-700', tags: ['Algoritma'], fileUrl: 'algoritma_treni.html' },
            { id: 'algorota', title: "AlgoRota", desc: "Mantıksal adımları takip ederek en doğru yolu çiz.", icon: '🗺️', color: 'from-green-500 to-teal-700', tags: ['Problem Çözme'], fileUrl: 'Algotora.html' },
            { id: 'belge_fabrikasi', title: "Belge Fabrikası", desc: "Banttan gelen belgeleri Word araçlarını kullanarak düzelt!", icon: '🏭', color: 'from-yellow-500 to-orange-700', tags: ['Kelime İşlemci'], fileUrl: 'belge_fabrikasi.html' },
            { id: 'bilgi_avcisi', title: "Bilgi Avcısı", desc: "Arama motoru operatörlerini kullanarak doğru bilgiye ulaş!", icon: '🔍', color: 'from-red-500 to-rose-800', tags: ['Araştırma'], fileUrl: 'bilgi_avcisi.html' },
            { id: 'bilgisayarimi_topluyorum', title: "Bilgisayarımı Topluyorum", desc: "Bilgisayar parçalarını gölgelerine sürükle!", icon: '🛠️', color: 'from-indigo-500 to-blue-800', tags: ['Donanım'], fileUrl: 'bilgisayarimi_topluyorum.html' },
            { id: 'bilisim_galaksisi', title: "Bilişim Galaksisi", desc: "3D Uzay ortamında donanım ve yazılım parçalarını keşfet.", icon: '🌌', color: 'from-blue-600 to-indigo-900', tags: ['Keşif'], fileUrl: 'Bilisim_Galaksisi.html' },
            { id: 'dijital_dedektif', title: "Dijital Dedektif", desc: "İnternetteki davranışları bul, kararını ver!", icon: '🕵️‍♂️', color: 'from-slate-600 to-slate-800', tags: ['Güvenli İnternet'], fileUrl: 'dijital_dedektif.html' },
            { id: 'piksel_sanat_atolyesi', title: "Piksel Sanat Atölyesi", desc: "Renkleri eşleştir, 50 farklı görevi tamamla!", icon: '🎨', color: 'from-emerald-400 to-teal-700', tags: ['Tasarım'], fileUrl: 'piksel_sanat_atolyesi.html' },
            { id: 'sihirli_sifre_satosu', title: "Sihirli Şifre Şatosu", desc: "Şatonun hazinesini korumak için sihirli şifreler yarat!", icon: '🏰', color: 'from-emerald-600 to-green-900', tags: ['Siber Güvenlik'], fileUrl: 'sihirli_sifre_satosu.html' }
        ];

        const linksList = [
            {
                title: "Scratch Jr",
                url: "https://codejr.org/scratchjr/index.html",
                icon: "🚀",
                bgColor: "bg-indigo-500/20",
                textColor: "text-indigo-400",
                shortDesc: "Web üzerinden oyna",
                longDesc: "Blokları sürükleyerek kendi hareketli hikayelerini ve küçük oyunlarını yapabilirsin. Kodlamaya başlamak için harika bir yer!"
            },
            {
                title: "Scratch",
                url: "https://scratch.mit.edu/",
                icon: "🐱",
                bgColor: "bg-orange-500/20",
                textColor: "text-orange-400",
                shortDesc: "Kendi oyununu kodla",
                longDesc: "Dünyanın en popüler blok tabanlı kodlama platformu. Hayal gücünü kullanarak kendi oyunlarını ve animasyonlarını yap!"
            },
            {
                title: "Code.org",
                url: "https://studio.code.org/tr/courses/coursea-2025/units/1?lang=tr-TR&redirect_warning=true",
                icon: "💻",
                bgColor: "bg-blue-500/20",
                textColor: "text-blue-400",
                shortDesc: "Kurs A (2025) - Kodlamaya Başla",
                longDesc: "Eğlenceli bulmacaları çözerek bilgisayarlara nasıl emir vereceğini öğreneceksin. Sürükle ve bırak mantığıyla kodlama çok kolay!"
            },
            {
                title: "Tinkercad",
                url: "https://www.tinkercad.com/",
                icon: "🧊",
                bgColor: "bg-cyan-500/20",
                textColor: "text-cyan-400",
                shortDesc: "3D Tasarım ve Devreler",
                longDesc: "Kendi 3D tasarımlarını yapabilir ve elektronik devreleri sanal ortamda güvenle kurup test edebilirsin."
            },
            {
                title: "FlipAnim",
                url: "https://flipanim.com/",
                icon: "✏️",
                bgColor: "bg-pink-500/20",
                textColor: "text-pink-400",
                shortDesc: "Hareketli animasyon yap",
                longDesc: "Sayfaları çevirince hareket eden defter kenarı animasyonlarını dijital ortamda çiz ve canlandır!"
            },
            {
                title: "Quick Draw",
                url: "https://quickdraw.withgoogle.com/",
                icon: "🎨",
                bgColor: "bg-yellow-500/20",
                textColor: "text-yellow-400",
                shortDesc: "Yapay zekaya çizim anlat",
                longDesc: "Yapay zekaya karşı çizim yarışması! Sen çiz, bilgisayar ne çizdiğini tahmin etmeye çalışsın. Bakalım onu yenebilecek misin?"
            },
            {
                title: "AutoDraw",
                url: "https://www.autodraw.com/",
                icon: "✨",
                bgColor: "bg-emerald-500/20",
                textColor: "text-emerald-400",
                shortDesc: "Karalamaları sanata çevir",
                longDesc: "Sen sadece basit karalamalar yap, yapay zeka senin ne çizmek istediğini anlayıp onu profesyonel bir resme dönüştürsün!"
            }
        ];

        function renderGames() {
            const grid = document.getElementById('games-grid');
            grid.innerHTML = '';

            gamesList.forEach(game => {
                const tagsHtml = game.tags.map(tag => `<span class="bg-black/30 text-white/90 text-[9px] md:text-[10px] font-bold px-2 py-1 rounded border border-white/10 backdrop-blur-sm whitespace-nowrap">${tag}</span>`).join('');

                const cardHTML = `
                    <a href="${game.fileUrl}" class="game-card glass-panel rounded-2xl md:rounded-3xl p-4 md:p-6 flex flex-col relative overflow-hidden group block cursor-pointer outline-none h-full min-h-[160px]">
                        <div class="absolute -right-6 -top-6 w-24 h-24 md:w-32 md:h-32 bg-gradient-to-br ${game.color} rounded-full opacity-20 blur-2xl group-hover:opacity-40 transition-opacity"></div>
                        
                        <div class="flex items-start gap-4 mb-3 md:mb-4">
                            <div class="w-14 h-14 md:w-16 md:h-16 rounded-xl md:rounded-2xl bg-gradient-to-br ${game.color} flex items-center justify-center text-3xl md:text-4xl shadow-lg transform group-hover:scale-110 group-hover:rotate-6 transition-all border border-white/20 shrink-0">
                                ${game.icon}
                            </div>
                            <h3 class="text-lg md:text-xl font-fredoka text-white leading-tight group-hover:text-blue-300 transition-colors pt-1">${game.title}</h3>
                        </div>
                        
                        <p class="text-slate-400 text-xs md:text-sm font-bold leading-relaxed mb-4 flex-1 line-clamp-3">
                            ${game.desc}
                        </p>
                        
                        <div class="flex flex-wrap gap-1.5 md:gap-2 mt-auto">
                            ${tagsHtml}
                        </div>
                    </a>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        function renderLinks() {
            const grid = document.getElementById('links-grid');
            grid.innerHTML = '';

            linksList.forEach((link, index) => {
                const cardHTML = `
                    <div onclick="openLinkModal(${index})" class="link-card group cursor-pointer h-full">
                        <div class="w-12 h-12 md:w-16 md:h-16 ${link.bgColor} ${link.textColor} rounded-xl flex items-center justify-center text-2xl md:text-4xl group-hover:scale-110 transition-transform shrink-0">${link.icon}</div>
                        <div class="flex-1 text-left min-w-0">
                            <h3 class="text-lg md:text-xl font-black text-white group-hover:${link.textColor} transition-colors truncate">${link.title}</h3>
                            <p class="text-[10px] md:text-xs text-slate-400 font-bold mt-0.5 md:mt-1 truncate">${link.shortDesc}</p>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        function openLinkModal(index) {
            const link = linksList[index];
            document.getElementById('link-modal-icon').innerText = link.icon;
            document.getElementById('link-modal-title').innerText = link.title;
            document.getElementById('link-modal-desc').innerText = link.longDesc;
            
            document.getElementById('link-modal-btn').onclick = () => {
                window.open(link.url, '_blank');
                closeLinkModal();
            };
            
            const modal = document.getElementById('link-modal');
            const content = document.getElementById('link-modal-content');
            modal.classList.remove('hidden');
            
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
                content.classList.add('scale-100');
            }, 10);
        }

        function closeLinkModal() {
            const modal = document.getElementById('link-modal');
            const content = document.getElementById('link-modal-content');
            
            modal.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function showGames() {
            document.getElementById('games-container').classList.remove('hidden');
            document.getElementById('links-container').classList.add('hidden');
            
            document.getElementById('btn-games').classList.replace('bg-slate-800', 'bg-blue-600');
            document.getElementById('btn-games').classList.replace('text-slate-300', 'text-white');
            document.getElementById('btn-games').classList.add('shadow-lg', 'shadow-blue-500/30');
            document.getElementById('btn-games').classList.remove('border', 'border-slate-600');
            
            document.getElementById('btn-links').classList.replace('bg-blue-600', 'bg-slate-800');
            document.getElementById('btn-links').classList.replace('text-white', 'text-slate-300');
            document.getElementById('btn-links').classList.remove('shadow-lg', 'shadow-blue-500/30');
            document.getElementById('btn-links').classList.add('border', 'border-slate-600');
        }

        function showUsefulLinks() {
            document.getElementById('games-container').classList.add('hidden');
            document.getElementById('links-container').classList.remove('hidden');

            document.getElementById('btn-links').classList.replace('bg-slate-800', 'bg-blue-600');
            document.getElementById('btn-links').classList.replace('text-slate-300', 'text-white');
            document.getElementById('btn-links').classList.add('shadow-lg', 'shadow-blue-500/30');
            document.getElementById('btn-links').classList.remove('border', 'border-slate-600');

            document.getElementById('btn-games').classList.replace('bg-blue-600', 'bg-slate-800');
            document.getElementById('btn-games').classList.replace('text-white', 'text-slate-300');
            document.getElementById('btn-games').classList.remove('shadow-lg', 'shadow-blue-500/30');
            document.getElementById('btn-games').classList.add('border', 'border-slate-600');
        }

        window.onload = () => {
            renderGames();
            renderLinks();
        };
    </script>
</body>
</html>
